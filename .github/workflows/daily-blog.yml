name: Daily Blog Clipping

on:
  schedule:
    # 매일 한국시간 오전 7시 (UTC 기준 전날 22시) 실행
    - cron: "0 22 * * *"
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install requests

      - name: Generate blog clipping
        env:
          NAVER_CLIENT_ID: ${{ secrets.NAVER_CLIENT_ID }}
          NAVER_CLIENT_SECRET: ${{ secrets.NAVER_CLIENT_SECRET }}
        run: python generate_blogs.py

      - name: Commit and push updated site
        run: |
          git config user.name "blog-tracker-bot"
          git config user.email "actions@github.com"
          git add index.html
          git diff --quiet --cached || git commit -m "Daily blog clipping update $(date -u +'%Y-%m-%d')"
          git push
