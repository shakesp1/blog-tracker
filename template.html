<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>일별 블로그 클리핑</title>
<style>
  :root {
    --paper: #F6F3EC;
    --ink: #22201C;
    --ink-soft: #6E6656;
    --rule: #DDD6C4;
    --card: #FFFFFF;
    --company: #1F7A6C;
    --topic: #B5651D;
    --company-bg: #E6F2EF;
    --topic-bg: #F6E9DC;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0; background: var(--paper); color: var(--ink);
    font-family: -apple-system, BlinkMacSystemFont, "Pretendard", "Apple SD Gothic Neo", "Segoe UI", sans-serif;
    -webkit-font-smoothing: antialiased;
  }
  .wrap { max-width: 760px; margin: 0 auto; padding: 36px 18px 80px; }

  header { margin-bottom: 6px; }
  .eyebrow {
    font-size: 11px; letter-spacing: 0.14em; text-transform: uppercase;
    color: var(--ink-soft); margin-bottom: 6px;
  }
  h1 { font-size: 24px; font-weight: 800; margin: 0 0 4px; letter-spacing: -0.01em; }
  .updated { font-size: 13px; color: var(--ink-soft); }

  .tab-group-label {
    font-size: 11px; color: var(--ink-soft); margin: 20px 0 6px; letter-spacing: 0.04em;
  }
  nav.tabs { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 4px; }
  nav.tabs button {
    border: 1px solid var(--rule); background: var(--card); color: var(--ink-soft);
    font-size: 13px; font-weight: 600; padding: 7px 14px; border-radius: 999px;
    cursor: pointer; transition: all 0.15s;
  }
  nav.tabs button:hover { border-color: var(--ink-soft); }
  nav.tabs button.active.company { background: var(--company); border-color: var(--company); color: #fff; }
  nav.tabs button.active.topic { background: var(--topic); border-color: var(--topic); color: #fff; }

  main { margin-top: 22px; }
  .tab-panel { display: none; }
  .tab-panel.active { display: block; }

  .post-list { display: flex; flex-direction: column; gap: 10px; }
  .post-card {
    background: var(--card); border: 1px solid var(--rule); border-radius: 10px;
    padding: 14px 16px; text-decoration: none; color: inherit; display: block;
    transition: border-color 0.15s, transform 0.1s;
  }
  .post-card:hover { border-color: var(--ink-soft); transform: translateY(-1px); }
  .post-title { font-size: 14.5px; font-weight: 700; margin-bottom: 6px; line-height: 1.45; }
  .post-meta { font-size: 12px; color: var(--ink-soft); display: flex; gap: 8px; flex-wrap: wrap; }
  .post-meta .dot::before { content: "·"; margin-right: 8px; }

  .empty-state {
    text-align: center; padding: 40px 20px; color: var(--ink-soft); font-size: 13.5px;
    border: 1px dashed var(--rule); border-radius: 10px;
  }

  footer {
    margin-top: 36px; padding-top: 16px; border-top: 1px solid var(--rule);
    font-size: 11.5px; color: var(--ink-soft); line-height: 1.7;
  }

  @media (max-width: 480px) {
    h1 { font-size: 20px; }
    nav.tabs button { font-size: 12.5px; padding: 6px 11px; }
  }
</style>
</head>
<body>
<div class="wrap">
  <header>
    <div class="eyebrow">Daily Blog Clipping</div>
    <h1>📎 일별 블로그 클리핑</h1>
    <div class="updated" id="updated-label"></div>
  </header>

  <div class="tab-group-label">기업</div>
  <nav class="tabs" id="tabs-company"></nav>

  <div class="tab-group-label">주제</div>
  <nav class="tabs" id="tabs-topic"></nav>

  <main id="tab-panels"></main>

  <footer>
    네이버 블로그 검색 결과를 매일 자동으로 모아 보여줍니다. 표시되는 제목/작성자/링크는 검색 결과 메타데이터이며,
    본문 내용은 원문 링크에서 확인해주세요. 투자 관련 글은 개인 의견이 섞여 있을 수 있으니 참고용으로만 봐주세요.
  </footer>
</div>

<script id="blog-data" type="application/json">__BLOG_DATA__</script>
<script>
  const data = JSON.parse(document.getElementById('blog-data').textContent);
  document.getElementById('updated-label').textContent = '업데이트: ' + data.updated;

  const tabsCompanyEl = document.getElementById('tabs-company');
  const tabsTopicEl = document.getElementById('tabs-topic');
  const panelsRoot = document.getElementById('tab-panels');

  function renderPosts(posts) {
    if (!posts || !posts.length) {
      return `<div class="empty-state">오늘 새로 올라온 글이 없어요.</div>`;
    }
    const items = posts.map(p => `
      <a class="post-card" href="${p.link}" target="_blank" rel="noopener">
        <div class="post-title">${p.title}</div>
        <div class="post-meta">
          <span>${p.blogger || '블로거 미상'}</span>
          <span class="dot">${p.date || ''}</span>
        </div>
      </a>
    `).join('');
    return `<div class="post-list">${items}</div>`;
  }

  let first = true;
  data.tabs.forEach(tab => {
    const btn = document.createElement('button');
    btn.textContent = tab.label;
    btn.dataset.tab = tab.id;
    btn.classList.add(tab.group);
    if (first) btn.classList.add('active');
    btn.addEventListener('click', () => switchTab(tab.id));
    (tab.group === 'company' ? tabsCompanyEl : tabsTopicEl).appendChild(btn);

    const panel = document.createElement('div');
    panel.className = 'tab-panel' + (first ? ' active' : '');
    panel.id = 'panel-' + tab.id;
    panel.innerHTML = renderPosts(tab.posts);
    panelsRoot.appendChild(panel);

    first = false;
  });

  function switchTab(id) {
    document.querySelectorAll('nav.tabs button').forEach(b =>
      b.classList.toggle('active', b.dataset.tab === id));
    document.querySelectorAll('.tab-panel').forEach(p =>
      p.classList.toggle('active', p.id === 'panel-' + id));
  }
</script>
</body>
</html>
